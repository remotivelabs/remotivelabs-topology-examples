schema: remotive-topology-instance:0.13

platform:
  includes:
    - ../../platform/remotive-car.platform.yaml

ecus:
  RL:
    channels:
      RearLightLIN:
    models:
      rl:
        type: container
        container:
          build:
            args:
              - MODEL_PATH=rl/python
            target: model
            dockerfile: ../../Dockerfile
          command: python -m rl
