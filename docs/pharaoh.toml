# pharaoh.toml — Pharaoh project configuration
# Generated by pharaoh-setup

[pharaoh]
mode = "reverse-eng"       # existing code, reverse-engineering requirements from it
project_root = ".."        # relative to this file
docs_root = "."            # relative to this file (the docs/ directory)

[pharaoh.diagrams]
renderer = "mermaid"       # project uses sphinxcontrib.mermaid

[pharaoh.diagrams.state]
renderer = "mermaid"

[pharaoh.diagrams.component]
renderer = "mermaid"

[pharaoh.quality]
build_command = "sphinx-build -b html . _build"
zero_warnings = true
