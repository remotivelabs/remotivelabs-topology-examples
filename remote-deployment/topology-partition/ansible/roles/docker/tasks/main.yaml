---
- name: Ensure APT dependencies are installed
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - bridge-utils
      - iproute2
      - net-tools
    update_cache: true
    state: present

# -------------------------
# Docker Installation
# -------------------------

- set_fact:
    docker_arch: >-
      {{ 'arm64' if ansible_facts['architecture'] == 'aarch64'
         else 'amd64' if ansible_facts['architecture'] == 'x86_64'
         else ansible_facts['architecture'] }}

- set_fact:
    docker_user: "ansible"

- name: Ensure Docker keyring directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'


- name: Add Docker APT repository (Debian or Ubuntu)
  when: ansible_facts['lsb']['codename'] != "jammy"
  copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
      Suites: {{ ansible_facts['lsb']['codename'] }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc

- name: Add Docker APT repository (Debian or Ubuntu) (debian jammy or ubuntu 22)
  when: ansible_facts['lsb']['codename'] == 'jammy'
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: >
      deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['lsb']['codename'] }} stable

- name: Ensure /etc/docker directory exists
  file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Add docker network settings
  copy:
    dest: /etc/docker/daemon.json
    content: |
      { "mtu": 1400 }

- name: Update apt package index AFTER adding repo
  apt:
    update_cache: true

- name: Install Docker Engine and related packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Ensure Docker service is enabled and started
  service:
    name: docker
    enabled: true
    state: started

# Optional user assignment (skip if variable not set)
- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: ansible_user is defined
