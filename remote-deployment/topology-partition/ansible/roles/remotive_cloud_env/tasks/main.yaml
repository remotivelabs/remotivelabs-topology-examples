---
# Persist the cloud auth token + organization in /etc/environment so EVERY login
# session picks them up — interactive terminals AND non-interactive ssh (e.g. an
# Electron app running `ssh host "<cmd>"`). ~/.bashrc only covers interactive
# shells (Ubuntu's even returns early for non-interactive), so it's not enough.
# Inputs: cloud_token, cloud_org (fetched locally before this runs).
- name: Set Remotive cloud env vars in /etc/environment
  become: true
  no_log: true            # don't echo the access token
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: "^{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    create: true
  loop:
    - { key: "REMOTIVE_CLOUD_AUTH_TOKEN", value: "{{ cloud_token }}" }
    - { key: "REMOTIVE_CLOUD_ORGANIZATION", value: "{{ cloud_org }}" }
  loop_control:
    label: "{{ item.key }}"
