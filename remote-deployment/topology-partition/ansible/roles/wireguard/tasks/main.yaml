- name: Enable IP forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true

- name: Ensure directory for WireGuard config
  file:
    path: /etc/wireguard
    state: directory
    mode: "0700"

- name: Render wg0.conf
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: "0600"

- name: Ensure old wg0 interface is removed if active
  shell: |
    wg-quick down wg0 || true
    ip link del wg0 2>/dev/null || true
  ignore_errors: true

- name: Ensure systemd unit file is enabled
  systemd:
    name: wg-quick@wg0
    enabled: true

- name: Restart WireGuard (idempotent, safe even if interface exists)
  systemd:
    name: wg-quick@wg0
    state: restarted
