[defaults]
inventory = inventory.ini
host_key_checking = False
remote_user = ubuntu
private_key_file = ~/.ssh/google_compute_engine
callback_whitelist = profile_tasks
gathering = explicit
forks = 10
pipelining = True
# Reuse the generic roles (docker, remotivebus, sync_files) from the partition sample
roles_path = ../../topology-partition/ansible/roles

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
