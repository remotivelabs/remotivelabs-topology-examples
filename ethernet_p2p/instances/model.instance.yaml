schema: remotive-topology-instance:0.17

name: ethernet-p2p-model

platform:
  includes:
    - ../platform/network.platform.yaml

channels:
  NET1:
    type: ethernet
    tap_config:
      type: socket
      mode: all
  NET2:
    type: ethernet
    tap_config:
      type: socket
      mode: all

ecus:
  ECUA:
    mock: {}

  ECUB:
    models:
      ecub:
        type: container
        container:
          build:
            target: model
            dockerfile: ../ecub_model/Dockerfile
          command: python -m src

  ECUC: {}
